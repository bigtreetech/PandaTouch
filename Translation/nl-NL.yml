  00x1A00120000020008: 'De positie van de gereedschapsvergrendelingsstang van het hotend-rek is afwijkend. Controleer op vreemde voorwerpen of obstakels die de vergrendelingsstang kunnen laten vastlopen.'
  00x1A00120000020009: 'Fout in de vergrendelingshendel van de inductie-hotend of het ontgrendelingsmechanisme van de rekhendel. Raadpleeg de wiki voor inspectie.'
