  mqtt_master_changed: |
   Kan geen verbinding maken met de printer!
   Zorg dat de printer is ingeschakeld en zich op hetzelfde LAN bevindt als de Panda Touch, of klik op "Bewerken" om het "IP" en de "SN" te controleren en opnieuw te bewerken.
   Aangezien dit de "Master" is, wordt tijdelijk een andere printer in de groep als "Master" aangewezen.
   Als u de printer hebt uitgeschakeld, negeer dan deze melding.
   Scan de QR-code om verbindingsproblemen op te lossen.
  mqtt_master_error: |
   Kan geen verbinding maken met de printer!
   Zorg dat de printer is ingeschakeld en zich op hetzelfde LAN bevindt als de Panda Touch, of klik op "Bewerken" om het "IP" en de "SN" te controleren en opnieuw te bewerken.
   Aangezien dit de "Master" is en er geen andere verbonden printers beschikbaar zijn in de groep, kunt u de Panda Touch niet gebruiken totdat dit is opgelost.
   Scan de QR-code om verbindingsproblemen op te lossen.
  mqtt_slave: |
   Kan geen verbinding maken met de printer!
   Zorg dat de printer is ingeschakeld en zich op hetzelfde LAN bevindt als de Panda Touch, of klik op "Bewerken" om het "IP" en de "SN" te controleren en opnieuw te bewerken.
   Deze printer is niet de "Master", dus deze is niet toegankelijk en kan de "Master" niet volgen als deze in een groep zit.
