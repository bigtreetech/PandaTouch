  00x1A00010000020033: 'Fout gedetecteerd tijdens het ophalen van de hotend uit slot %s: het rek kon de hotend niet goed monteren. Controleer op overmatig filament bovenaan de hotend, vuil in het contactgebied tussen de printkop en de hotend, of of de vergrendelingshendel in de ontgrendelde stand staat. Klik na het oplossen op "Doorgaan".'
  00x1A00010000020034: 'Fout gedetecteerd tijdens het ophalen van de hotend uit slot %s: de hotend is gevallen. Controleer op overmatig filament of ander vuil bovenaan de hotend, snij of verwijder dit, herinstalleer de hotend in slot %s op het rek en klik op "Doorgaan".'
  00x1A00010000020035: 'Fout gedetecteerd tijdens het ophalen van de hotend uit slot %s: rekbeweging is geblokkeerd. Controleer op vreemde voorwerpen, verwijder deze en klik vervolgens op "Doorgaan".'
  00x1A00010000020036: 'Fout gedetecteerd tijdens het ophalen van de hotend uit slot %s: hercentreren van de printkop opnieuw geprobeerd, mislukt. Verplaats de printkop handmatig naar het midden van de bouwplaat en klik vervolgens op "Doorgaan".'
