  00x1A00120000020002: 'Kalibratie inductie-hotend-rek mislukt: de witte marker op de inductie-hotend-dockmodule van het rek is niet gedetecteerd. Raadpleeg de wiki om te controleren of de marker beschadigd of bedekt met vuil is.'
